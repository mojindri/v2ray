events {}

http {
    server {
        listen 80;

        # Return a distinctive body so tests can tell they hit the fallback
        # rather than a real VLESS/REALITY authenticated connection.
        location / {
            return 200 "xray-fallback-nginx\n";
            add_header Content-Type text/plain;
            add_header X-Fallback "true";
        }
    }
}
