services:
  target-http:
    image: hashicorp/http-echo:1.0
    command:
      - "-listen=:8080"
      - "-text=blackwire external client target"

  # ShadowTLS v3 cover TLS backend (Xray/sing-box handshake target).
  tls-cover:
    image: nginx:alpine
    hostname: tls-cover
    volumes:
      - ./generated/certs:/etc/nginx/certs:ro
      - ./tls-cover/nginx.conf:/etc/nginx/conf.d/default.conf:ro

  # Long-lived probe: nc + curl (no per-check docker run --rm).
  matrix-probe:
    image: alpine:3.20
    command: ["sleep", "infinity"]
    volumes:
      - ./scripts:/scripts:ro
    depends_on:
      - target-http
      - tls-cover

  # Debian-based image: idle holder + exec-driven blackwire runs.
  blackwire-server:
    image: blackwire:latest
    hostname: blackwire-server
    dns:
      - 127.0.0.11
    entrypoint: ["/bin/sh", "-c"]
    command: ["exec sleep infinity"]
    volumes:
      - ./generated/blackwire:/generated/blackwire:ro
      - ./generated/certs:/etc/blackwire/certs:ro
    depends_on:
      - target-http
      - tls-cover

  # sing-box image includes /bin/sh — idle holder + exec-driven runs.
  sing-box-client:
    image: ghcr.io/sagernet/sing-box:latest
    hostname: sing-box-client
    entrypoint: ["/bin/sh", "-c"]
    command: ["exec sleep infinity"]
    volumes:
      - ./generated:/generated:ro
    depends_on:
      - target-http

  # Xray-core is distroless (no shell). Not started via `compose up`; matrix uses
  # `compose run --name xray-client` per case (see run-docker-matrix.sh).
  xray-client:
    image: ghcr.io/xtls/xray-core:latest
    hostname: xray-client
    volumes:
      - ./generated:/generated:ro
    depends_on:
      - target-http
