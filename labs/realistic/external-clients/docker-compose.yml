services:
  target-http:
    image: hashicorp/http-echo:1.0
    command:
      - "-listen=:8080"
      - "-text=blackwire external client target"

  blackwire-server:
    image: blackwire:latest
    volumes:
      - ./generated/blackwire:/generated/blackwire:ro
      - ./generated/certs:/etc/blackwire/certs:ro
    command: ["run", "-c", "/generated/blackwire/server-vless-tcp.json"]
    depends_on:
      - target-http

  xray-client:
    image: ghcr.io/xtls/xray-core:latest
    volumes:
      - ./generated:/generated:ro
    command: ["run", "-c", "/generated/xray/vless-tcp.json"]
    depends_on:
      - blackwire-server

  sing-box-client:
    image: ghcr.io/sagernet/sing-box:latest
    volumes:
      - ./generated:/generated:ro
    command: ["run", "-c", "/generated/sing-box/vless-tcp.json"]
    depends_on:
      - blackwire-server
