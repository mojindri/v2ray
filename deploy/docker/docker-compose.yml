# docker-compose.yml — example deployment for blackwire.
#
# Usage:
#   # Build and start:
#   docker-compose up -d
#
#   # View logs:
#   docker-compose logs -f
#
#   # Stop:
#   docker-compose down
#
# Prerequisites:
#   - Create /etc/blackwire/config.json on the host before starting.
#   - The config should use metricsAddr: "0.0.0.0:8080" to expose the
#     Prometheus metrics endpoint (port 8080 is mapped below).

version: "3.9"

services:
  blackwire:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    image: blackwire:latest
    container_name: blackwire

    # Restart automatically unless explicitly stopped.
    restart: unless-stopped

    # Mount the config directory from the host.
    # Place your config.json at /etc/blackwire/config.json on the host.
    volumes:
      - /etc/blackwire:/etc/blackwire:ro

    # Expose the main proxy port (443) and the metrics/health endpoint (8080).
    ports:
      - "443:443"
      - "8080:8080"

    # Environment
    environment:
      - RUST_LOG=info

    # Security: drop all capabilities except what's needed for binding to :443.
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

    # Read-only filesystem for the container; only /tmp is writable.
    read_only: true
    tmpfs:
      - /tmp

    # Resource limits.
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

    # Health check via the /healthz endpoint.
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
