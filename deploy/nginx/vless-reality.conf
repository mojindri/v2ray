# nginx/vless-reality.conf — Nginx configuration for the REALITY fallback backend.
#
# When a probe connects to our proxy port and fails REALITY authentication,
# we forward the connection to Nginx serving a real website. The probe sees
# a legitimate HTTPS response and cannot distinguish our server from a real website.
#
# This file is a minimal example. In production, replace the static fallback
# with a real website or reverse-proxy to a real backend.
#
# Usage:
#   ln -s /path/to/vless-reality.conf /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx

server {
    listen 127.0.0.1:80;
    server_name _;

    # Serve a minimal "real" website so probers get a 200 response.
    # Replace this with your actual website content.
    root /var/www/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # Cache static assets aggressively to look like a real site.
    location ~* \.(js|css|png|jpg|ico|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
