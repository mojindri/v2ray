name: Interop smoke

on:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

env:
  CARGO_TERM_COLOR: always
  MATRIX_PCAP_ON_FAIL: "1"

jobs:
  integration-matrix:
    name: Integration matrix
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Stable integration tests
        run: timeout 20m cargo test -p integration-tests --locked
      - name: Advanced feature smoke (ShadowTLS, mKCP)
        run: timeout 20m make -C labs/realistic advanced-features-smoke
      - name: Negative auth smoke
        run: timeout 10m make -C labs/realistic negative-auth
      - name: Upload integration logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: integration-logs
          path: |
            labs/realistic/reports/advanced-features-smoke.log
            labs/realistic/reports/negative-auth.log
          if-no-files-found: ignore
          retention-days: 14

  interop-docker:
    name: External clients (Docker, ${{ matrix.shard }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard: vless-core
            protocols: vless-reality,vless-tcp,vless-mux,vless-vision,vless-udp
          - shard: vless-transports
            protocols: vless-ws,vless-httpupgrade,vless-quic,vless-splithttp,vless-splithttp-packet-up,vless-sniff
          - shard: vmess-trojan-ss
            protocols: vmess-grpc,trojan-tls,trojan-udp,ss2022,ss2022-udp
          - shard: hysteria-edge
            protocols: hysteria2,vless-shadowtls,vless-mkcp
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Docker interop server-compat
        env:
          MATRIX_PROTOCOLS: ${{ matrix.protocols }}
        run: timeout 45m make -C labs/realistic interop-server-docker
      - name: Check external-client summary
        run: |
          summary="labs/realistic/reports/external-clients/summary.txt"
          test -f "$summary"
          grep -E '^(PASS|FAIL|SKIP) ' "$summary" || true
          if grep -q '^FAIL ' "$summary"; then
            echo "external-client matrix reported failures"
            exit 1
          fi
      - name: Upload interop logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: interop-logs-${{ matrix.shard }}
          path: labs/realistic/reports/
          if-no-files-found: ignore
          retention-days: 21
