name: Release assets

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build and upload assets for"
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  prepare-release:
    name: Prepare release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      tag: ${{ steps.release.outputs.tag }}
    steps:
      - name: Resolve tag
        id: release
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Ensure release exists
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
        shell: bash
        run: |
          prerelease_args=()
          if [[ "$TAG" == *-* ]]; then
            prerelease_args+=(--prerelease)
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            if [[ "$TAG" == *-* ]]; then
              gh release edit "$TAG" --prerelease
            fi
            exit 0
          fi

          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file CHANGELOG.md \
            "${prerelease_args[@]}"

  build:
    name: Build ${{ matrix.asset }}
    needs: prepare-release
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    env:
      TAG: ${{ needs.prepare-release.outputs.tag }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: blackwire-linux-x86_64
            binary: blackwire
            archive: blackwire-linux-x86_64.tar.gz
            deb_arch: amd64
            ui_asset: black-ui-linux-x86_64
            ui_archive: black-ui-linux-x86_64.tar.gz
          - os: ubuntu-24.04-arm
            asset: blackwire-linux-arm64
            binary: blackwire
            archive: blackwire-linux-arm64.tar.gz
            deb_arch: arm64
            ui_asset: black-ui-linux-arm64
            ui_archive: black-ui-linux-arm64.tar.gz
          - os: macos-latest
            asset: blackwire-macos
            binary: blackwire
            archive: blackwire-macos.tar.gz
          - os: windows-latest
            asset: blackwire-windows-x86_64
            binary: blackwire.exe
            archive: blackwire-windows-x86_64.zip

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare-release.outputs.tag }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked --bin blackwire

      - name: Package Unix asset
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist/${{ matrix.asset }}
          cp target/release/${{ matrix.binary }} dist/${{ matrix.asset }}/
          chmod +x dist/${{ matrix.asset }}/${{ matrix.binary }}
          cp README.md CHANGELOG.md dist/${{ matrix.asset }}/
          tar -C dist -czf dist/${{ matrix.archive }} ${{ matrix.asset }}
          (cd dist && shasum -a 256 ${{ matrix.archive }} > ${{ matrix.archive }}.sha256)

      - name: Package Debian asset
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          version="${TAG#v}"
          bash scripts/package-deb.sh "$version" "${{ matrix.deb_arch }}" "target/release/${{ matrix.binary }}" dist

      - uses: actions/setup-node@v6
        if: runner.os == 'Linux'
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: black-ui/frontend/package-lock.json

      - name: Build Black UI asset
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          (cd black-ui/frontend && npm ci && npm run build)
          cargo build --release --locked --bin black-ui
          mkdir -p "dist/${{ matrix.ui_asset }}/frontend"
          cp target/release/black-ui "dist/${{ matrix.ui_asset }}/"
          chmod +x "dist/${{ matrix.ui_asset }}/black-ui"
          cp -a black-ui/frontend/dist "dist/${{ matrix.ui_asset }}/frontend/dist"
          cp README.md CHANGELOG.md "dist/${{ matrix.ui_asset }}/"
          tar -C dist -czf "dist/${{ matrix.ui_archive }}" "${{ matrix.ui_asset }}"
          (cd dist && shasum -a 256 "${{ matrix.ui_archive }}" > "${{ matrix.ui_archive }}.sha256")

      - name: Package Windows asset
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "dist/${{ matrix.asset }}" | Out-Null
          Copy-Item "target/release/${{ matrix.binary }}" "dist/${{ matrix.asset }}/"
          Copy-Item README.md,CHANGELOG.md "dist/${{ matrix.asset }}/"
          Compress-Archive -Path "dist/${{ matrix.asset }}" -DestinationPath "dist/${{ matrix.archive }}" -Force
          $hash = (Get-FileHash "dist/${{ matrix.archive }}" -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ matrix.archive }}" | Out-File -FilePath "dist/${{ matrix.archive }}.sha256" -Encoding ascii

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare-release.outputs.tag }}
        shell: bash
        run: |
          assets=(
            "dist/${{ matrix.archive }}"
            "dist/${{ matrix.archive }}.sha256"
          )
          if [ "${{ runner.os }}" = "Linux" ]; then
            version="${TAG#v}"
            deb="blackwire_${version}_${{ matrix.deb_arch }}.deb"
            assets+=("dist/$deb" "dist/$deb.sha256")
            assets+=("dist/${{ matrix.ui_archive }}" "dist/${{ matrix.ui_archive }}.sha256")
          fi
          gh release upload "$TAG" "${assets[@]}" --clobber

  apt-repository:
    name: Publish apt repository
    needs:
      - prepare-release
      - build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TAG: ${{ needs.prepare-release.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare-release.outputs.tag }}

      - name: Download Debian assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p apt-input
          gh release download "$TAG" \
            --pattern 'blackwire_*.deb' \
            --dir apt-input
          ls -l apt-input

      - name: Build apt metadata
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y dpkg-dev
          bash scripts/build-apt-repo.sh apt-input apt stable main

      - name: Publish gh-pages apt repository
        shell: bash
        run: |
          set -euo pipefail
          work="$(mktemp -d)"
          git clone --depth 1 --branch gh-pages "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" "$work" 2>/dev/null || {
            git clone --depth 1 "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" "$work"
            cd "$work"
            git checkout --orphan gh-pages
            git rm -rf . >/dev/null 2>&1 || true
            cd -
          }
          rm -rf "$work/apt"
          mkdir -p "$work"
          cp -a apt "$work/apt"
          cd "$work"
          touch .nojekyll
          cat > index.html <<'HTML'
          <!doctype html>
          <meta charset="utf-8">
          <title>Blackwire apt repository</title>
          <h1>Blackwire apt repository</h1>
          <pre>deb [trusted=yes] https://mojindri.github.io/Blackwire/apt stable main</pre>
          HTML
          sed -i 's/^          //' index.html
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .nojekyll index.html apt
          git commit -m "Publish apt repository for $TAG" || exit 0
          git push origin gh-pages
