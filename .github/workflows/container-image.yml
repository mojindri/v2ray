name: Container image

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v0.1.0-rc.3"
        required: true

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

env:
  DOCKER_BUILD_SUMMARY: true

jobs:
  publish-ghcr:
    name: Publish GHCR image
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Resolve tag
        id: release
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$tag" =~ ^v[0-9]+(\.[0-9]+)*(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release tag: $tag" >&2
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Prepare image metadata
        id: image
        shell: bash
        run: |
          tag="${{ steps.release.outputs.tag }}"
          version="${tag#v}"
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          revision="$(git rev-parse HEAD)"

          {
            echo "tags<<EOF"
            echo "$image:$tag"
            echo "$image:$version"
            if [[ "$tag" == *-* ]]; then
              echo "$image:rc"
            else
              echo "$image:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          {
            echo "labels<<EOF"
            echo "org.opencontainers.image.title=blackwire"
            echo "org.opencontainers.image.description=Rust-native proxy implementation for server and local proxy paths"
            echo "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}"
            echo "org.opencontainers.image.revision=$revision"
            echo "org.opencontainers.image.version=$version"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.image.outputs.tags }}
          labels: ${{ steps.image.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: mode=max
